# https://pnpm.io/settings

# Disable pnpm's release-age gate (default in pnpm 11) so installs stay
# deterministic in CI without a version-pinned exclude list.
minimumReleaseAge: 0

# Don't re-verify dependencies before each `pnpm run` script: CI installs
# once up front, so the pre-run check only adds a redundant registry round-trip.
verifyDepsBeforeRun: false

# Allow the native postinstall builds required by the toolchain.
allowBuilds:
  '@parcel/watcher': true
  esbuild: true
